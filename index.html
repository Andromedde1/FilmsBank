<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Банк фильмов</title>
  <link rel="stylesheet" href="css/style.css">
</head>
<body>
  <div class="app">
    <header class="header">
      <h1>Банк фильмов</h1>
      <p class="subtitle">Собирайте список и крутите рулетку</p>
    </header>

    <nav class="tabs">
      <button class="tab active" data-tab="bank">Банк фильмов</button>
      <button class="tab" data-tab="roulette">Рулетка</button>
    </nav>

    <main>
      <section id="bank" class="panel active">
        <form id="add-form" class="add-form">
          <input
            type="text"
            id="movie-input"
            placeholder="Введите название фильма..."
            autocomplete="off"
            maxlength="120"
            required
          >
          <button type="submit">Добавить</button>
        </form>
        <p id="bank-hint" class="hint"></p>
        <ul id="movie-list" class="movie-list"></ul>
        <p id="empty-bank" class="empty-state">Пока нет фильмов. Добавьте первый!</p>
      </section>

      <section id="roulette" class="panel">
        <div class="roulette-wrap">
          <div class="pointer"></div>
          <canvas id="wheel" width="420" height="420"></canvas>
        </div>
        <button id="spin-btn" class="spin-btn" disabled>Крутить</button>
        <p id="roulette-result" class="result"></p>
        <p id="empty-roulette" class="empty-state">Добавьте фильмы в банк, чтобы крутить рулетку.</p>
      </section>
    </main>
  </div>

  <script src="js/app.js"></script>
</body>
</html>
